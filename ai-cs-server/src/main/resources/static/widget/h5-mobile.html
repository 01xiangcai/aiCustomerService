<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AI 客服助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary-color: #0f172a;
      --bg-color: #f8fafc;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --bubble-bot: #ffffff;
      --bubble-user: var(--primary-color);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: var(--bg-color); overflow: hidden; }
    #app { display: flex; flex-direction: column; height: 100vh; height: -webkit-fill-available; }
    
    /* 头部 */
    header { height: 50px; background: var(--primary-color); color: #fff; display: flex; align-items: center; padding: 0 15px; flex-shrink: 0; box-shadow: 0 1px 10px rgba(0,0,0,0.1); z-index: 10; padding-top: env(safe-area-inset-top); }
    .title { font-size: 17px; font-weight: 600; flex: 1; }
    .reset-btn { font-size: 14px; opacity: 0.8; border: 1px solid rgba(255,255,155,0.3); padding: 4px 8px; border-radius: 4px; }

    /* 消息区 */
    #messages { flex: 1; overflow-y: auto; padding: 15px; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
    .msg-item { display: flex; margin-bottom: 20px; animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .msg-item.user { flex-direction: row-reverse; }
    
    .bubble { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.6; word-break: break-all; box-shadow: 0 2px 8rpx rgba(0,0,0,0.02); }
    .assistant .bubble { background: var(--bubble-bot); color: var(--text-main); border-bottom-left-radius: 2px; border: 1px solid #eef2f6; }
    .user .bubble { background: var(--bubble-user); color: #fff; border-bottom-right-radius: 2px; }

    /* Markdown 样式 */
    .bubble pre { background: #1e293b; color: #e2e8f0; padding: 10px; border-radius: 6px; overflow-x: auto; margin: 8px 0; }
    .bubble code { font-family: monospace; background: rgba(0,0,0,0.05); padding: 2px 4px; border-radius: 3px; font-size: 0.9em; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 13px; }
    .bubble th, .bubble td { border: 1px solid #ddd; padding: 6px 8px; text-align: left; }
    .bubble th { background: #f1f5f9; }

    /* 输入区 */
    footer { padding: 12px 15px; background: #fff; border-top: 1px solid #e2e8f0; display: flex; align-items: flex-end; gap: 10px; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
    textarea { flex: 1; border: 1px solid #cbd5e1; border-radius: 20px; padding: 9px 15px; font-size: 15px; outline: none; background: #f8fafc; max-height: 120px; resize: none; line-height: 1.4; }
    #send-btn { width: 50px; height: 38px; background: var(--primary-color); color: #fff; border: none; border-radius: 19px; font-size: 14px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
    #send-btn:disabled { opacity: 0.5; }

    .loading { display: flex; gap: 4px; padding: 10px; }
    .dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: dotBounce 1.4s infinite; }
    @keyframes dotBounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="title" id="app-title">AI 客服</div>
      <div class="reset-btn" onclick="resetChat()">新签会话</div>
    </header>
    <div id="messages"></div>
    <footer>
      <textarea id="input" rows="1" placeholder="说点什么..." oninput="autoHeight(this)"></textarea>
      <button id="send-btn" onclick="doSend()">发送</button>
    </footer>
  </div>

  <script>
    // 从 URL 获取配置
    const urlParams = new URLSearchParams(window.location.search);
    const appKey = urlParams.get('appKey');
    const serverUrl = window.location.origin;

    if (!appKey) {
      document.getElementById('messages').innerHTML = '<div style="padding:20px;color:red">错误：缺少 AppKey 参数</div>';
    }

    let sessionId = localStorage.getItem('aics_session_' + appKey) || ('h5_' + Math.random().toString(36).slice(2, 10));
    localStorage.setItem('aics_session_' + appKey, sessionId);

    let isTyping = false;

    // 初始化
    fetch(`${serverUrl}/open/chat/${appKey}/info`)
      .then(r => r.json())
      .then(res => {
        if(res.data) {
          document.getElementById('app-title').innerText = res.data.appName;
          document.documentElement.style.setProperty('--primary-color', res.data.themeColor);
          loadHistory(res.data.welcomeMsg);
        }
      });

    function loadHistory(welcome) {
      fetch(`${serverUrl}/open/chat/${appKey}/history?sessionId=${sessionId}&limit=30`)
        .then(r => r.json())
        .then(res => {
          const list = res.data || [];
          const container = document.getElementById('messages');
          if(list.length === 0 && welcome) {
            renderMessage('assistant', welcome);
          } else {
            list.forEach(m => renderMessage(m.role, m.content));
          }
          scrollDown();
        });
    }

    function doSend() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if(!text || isTyping) return;

      try {
        renderMessage('user', text);
        input.value = '';
        autoHeight(input);
        
        isTyping = true;
        document.getElementById('send-btn').disabled = true;
        document.getElementById('send-btn').innerText = '...';

        fetch(`${serverUrl}/open/chat/${appKey}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, sessionId: sessionId, userId: sessionId })
        })
        .then(r => r.json())
        .then(res => {
          if (res.code === 200) {
            renderMessage('assistant', res.data);
          } else {
            renderMessage('assistant', '服务响应异常：' + (res.msg || '未知错误'));
          }
        })
        .catch(err => {
          console.error(err);
          renderMessage('assistant', '网络请求失败，请检查后端链接');
        })
        .finally(() => {
          isTyping = false;
          document.getElementById('send-btn').disabled = false;
          document.getElementById('send-btn').innerText = '发送';
          scrollDown();
        });
      } catch (e) {
        console.error(e);
      }
    }

    function renderMessage(role, content) {
      const container = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg-item ' + role;
      
      let html = '';
      if (window.marked && typeof marked.parse === 'function') {
        try { html = marked.parse(content); } catch (e) { html = content; }
      } else {
        html = content.replace(/\n/g, '<br>'); // 回退方案
      }
      
      div.innerHTML = `<div class="bubble">${html}</div>`;
      container.appendChild(div);
      scrollDown();
    }

    function resetChat() {
      if(confirm('重置将清空当前对话记录，是否继续？')) {
        sessionId = 'h5_' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem('aics_session_' + appKey, sessionId);
        location.reload();
      }
    }

    function scrollDown() {
      const m = document.getElementById('messages');
      m.scrollTop = m.scrollHeight;
    }

    function autoHeight(el) {
      el.style.height = 'auto';
      el.style.height = (el.scrollHeight) + 'px';
    }

    // 处理 Enter 发送
    document.getElementById('input').addEventListener('keypress', e => {
      if(e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        doSend();
      }
    });
  </script>
</body>
</html>
