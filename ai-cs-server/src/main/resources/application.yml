server:
  port: 9900
  servlet:
    context-path: /

spring:
  application:
    name: ai-cs-server

  # MySQL 主数据源
  datasource:
    url: jdbc:mysql://localhost:3306/ai_customer_service?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      database: 0

  # Spring AI - 硅基流动（SiliconFlow）兼容 OpenAI 格式
  ai:
    openai:
      api-key: ${AI_API_KEY:sk-cwdjbdkgrdmctlfbukcacxdgwyfcfoqitlwnfjhsdkcggpni}
      base-url: ${AI_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
          model: ${AI_MODEL:deepseek-ai/DeepSeek-V3}
          temperature: 0.7
          max-tokens: 2048
      embedding:
        base-url: ${AI_BASE_URL:https://api.siliconflow.cn}
        options:
          model: BAAI/bge-large-zh-v1.5

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# PGVector 数据源（向量存储）
pgvector:
  url: jdbc:postgresql://localhost:5432/ai_customer_service
  username: postgres
  password: Yaoyuelong123.,

# JWT 配置
jwt:
  secret: ${JWT_SECRET:aics-jwt-secret-key-please-change-in-production-2024}
  expiration: 86400000  # 24 小时（毫秒）

# 文件存储
file:
  upload-dir: ./uploads
