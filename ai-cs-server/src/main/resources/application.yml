server:
  port: 9900
  servlet:
    context-path: /

spring:
  application:
    name: ai-cs-server
  profiles:
    active: dev # 默认激活开发环境

  # Spring AI - 硅基流动（SiliconFlow）兼容 OpenAI 格式
  ai:
    openai:
      api-key: ${AI_API_KEY:sk-cwdjbdkgrdmctlfbukcacxdgwyfcfoqitlwnfjhsdkcggpni}
      base-url: ${AI_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
          model: ${AI_MODEL:deepseek-ai/DeepSeek-V3}
          temperature: 0.7
          max-tokens: 2048
      embedding:
        base-url: ${AI_BASE_URL:https://api.siliconflow.cn}
        options:
          model: BAAI/bge-large-zh-v1.5

  # 文件上传限制
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

# MyBatis Plus 基本配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT 基本配置
jwt:
  secret: ${JWT_SECRET:aics-jwt-secret-key-please-change-in-production-2024}
  expiration: 86400000  # 24 小时（毫秒）

# 文件存储
file:
  upload-dir: ./uploads
